<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vulcan Quanta — AI-Powered Quantity Surveying</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  
  <template id="__bundler_thumbnail" data-bg-color="#0F172A">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <rect width="1200" height="800" fill="#0F172A"/>
      <!-- Logo wordmark -->
      <text x="600" y="340" font-family="serif" font-size="80" font-weight="700" fill="#FAFAF9" text-anchor="middle" letter-spacing="-2">Vulcan Quanta</text>
      <!-- Accent underline -->
      <rect x="480" y="365" width="240" height="4" rx="2" fill="#2563EB"/>
      <!-- Tagline -->
      <text x="600" y="430" font-family="sans-serif" font-size="28" fill="#6B7280" text-anchor="middle">AI-Powered Quantity Surveying</text>
      <!-- BoQ table preview lines -->
      <rect x="300" y="490" width="600" height="2" fill="#1F2937"/>
      <rect x="300" y="520" width="440" height="12" rx="3" fill="#1F2937" opacity="0.8"/>
      <rect x="760" y="520" width="140" height="12" rx="3" fill="#2563EB" opacity="0.7"/>
      <rect x="300" y="550" width="380" height="10" rx="3" fill="#1F2937" opacity="0.5"/>
      <rect x="300" y="575" width="420" height="10" rx="3" fill="#1F2937" opacity="0.4"/>
      <rect x="300" y="600" width="600" height="2" fill="#1F2937"/>
    </svg>
  </template>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-slate: #0F172A;
      --off-white: #FAFAF9;
      --light-gray: #F3F4F6;
      --border-gray: #E5E7EB;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --accent-amber: #F97316;
      --accent-blue: #2563EB;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      
      --font-display: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
      
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      background: var(--off-white);
      line-height: 1.6;
    }

    /* Layout & Grid */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header / Navigation */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--off-white);
      border-bottom: 1px solid var(--border-gray);
      backdrop-filter: blur(10px);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 72px;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--dark-slate);
      text-decoration: none;
      cursor: pointer;
    }

    .nav-center {
      display: flex;
      gap: 48px;
      align-items: center;
    }

    .nav-center a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
    }

    .nav-center a:hover {
      color: var(--text-primary);
    }

    .nav-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent-color, var(--accent-amber));
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(249, 115, 22, 0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-gray);
    }

    .btn-secondary:hover {
      background: var(--light-gray);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .btn-ghost:hover {
      color: var(--text-primary);
    }

    /* Typography */
    h1 {
      font-family: var(--font-display);
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 24px;
    }

    h2 {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    h3 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    h4 {
      font-family: var(--font-body);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 16px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .text-small {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Spacing */
    .section {
      padding: 120px 0;
    }

    .section-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Hero Section */
    .hero {
      padding: 120px 0 80px;
      background: linear-gradient(135deg, #FAFAF9 0%, #F3F4F6 100%);
    }

    .hero-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .hero-text h1 {
      color: var(--dark-slate);
      margin-bottom: 24px;
    }

    .hero-subhead {
      font-size: 20px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .hero-ctas {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-large {
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 600;
    }

    .hero-visual {
      background: linear-gradient(135deg, #E5E7EB 0%, #D1D5DB 100%);
      border-radius: 12px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .hero-visual-content {
      text-align: center;
      animation: fadeInScale 0.8s ease-out;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .before-after {
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: center;
    }

    .before-after-item {
      text-align: center;
    }

    .before-after-item svg {
      width: 120px;
      height: 120px;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .before-after-arrow {
      font-size: 28px;
      color: var(--accent-color, var(--accent-amber));
      font-weight: 700;
    }

    /* Social Proof */
    .social-proof {
      background: var(--dark-slate);
      color: var(--off-white);
      padding: 60px 0;
      text-align: center;
    }

    .social-proof p {
      color: var(--off-white);
      font-size: 18px;
      margin: 0;
    }

    /* Features Grid */
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px;
      margin-top: 60px;
    }

    .feature-card {
      padding: 40px;
      background: white;
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      transition: var(--transition);
    }

    .feature-card:hover {
      border-color: var(--accent-color, var(--accent-amber));
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--light-gray);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
      color: var(--accent-color, var(--accent-amber));
    }

    .feature-card h4 {
      color: var(--dark-slate);
      margin-bottom: 12px;
    }

    .feature-card p {
      font-size: 15px;
      margin: 0;
    }

    /* How It Works */
    .how-it-works {
      background: white;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      margin-top: 60px;
    }

    .step {
      text-align: center;
    }

    .step-number {
      width: 56px;
      height: 56px;
      background: var(--accent-color, var(--accent-amber));
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      margin: 0 auto 24px;
    }

    .step h4 {
      color: var(--dark-slate);
    }

    /* ROI Section */
    .roi {
      background: linear-gradient(135deg, var(--dark-slate) 0%, #1F2937 100%);
      color: var(--off-white);
    }

    .roi h2 {
      color: var(--off-white);
      margin-bottom: 60px;
    }

    .roi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 40px;
      margin-bottom: 60px;
    }

    .roi-stat {
      text-align: center;
    }

    .roi-number {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 700;
      color: var(--accent-color, var(--accent-amber));
      margin-bottom: 8px;
    }

    .roi-label {
      font-size: 14px;
      color: rgba(250, 250, 249, 0.7);
    }

    .roi-explanation {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.8;
    }

    /* Trust Section */
    .trust {
      background: white;
    }

    .trust-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      margin-top: 40px;
    }

    .trust-points {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .trust-point {
      display: flex;
      gap: 20px;
    }

    .trust-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: var(--success);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trust-text h4 {
      margin-bottom: 4px;
    }

    .trust-text p {
      font-size: 15px;
      margin: 0;
    }

    /* Pricing Section */
    .pricing {
      background: white;
    }

    .pricing-intro {
      text-align: center;
      margin-bottom: 60px;
    }

    .pricing-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 40px;
    }

    .pricing-card {
      border: 1px solid var(--border-gray);
      border-radius: 12px;
      padding: 40px;
      transition: var(--transition);
      position: relative;
    }

    .pricing-card.featured {
      border: 2px solid var(--accent-color, var(--accent-amber));
      box-shadow: 0 12px 48px rgba(249, 115, 22, 0.15);
      transform: translateY(-8px);
    }

    .pricing-badge {
      position: absolute;
      top: -12px;
      left: 20px;
      background: var(--accent-color, var(--accent-amber));
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .pricing-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark-slate);
      margin-bottom: 8px;
    }

    .pricing-price {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      color: var(--dark-slate);
      margin-bottom: 4px;
    }

    .pricing-price-period {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .pricing-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .pricing-features li {
      font-size: 15px;
      color: var(--text-secondary);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .pricing-features li:before {
      content: '✓';
      color: var(--success);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .pricing-features li.disabled {
      opacity: 0.5;
    }

    .pricing-features li.disabled:before {
      content: '−';
      color: var(--text-secondary);
    }

    .pricing-card .btn {
      width: 100%;
      margin-top: 16px;
    }

    /* Testimonials */
    .testimonials {
      background: var(--light-gray);
    }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
      margin-top: 40px;
    }

    .testimonial {
      background: white;
      padding: 32px;
      border-radius: 8px;
      border: 1px solid var(--border-gray);
    }

    .testimonial-quote {
      font-size: 16px;
      font-style: italic;
      color: var(--text-primary);
      margin-bottom: 20px;
      line-height: 1.8;
    }

    .testimonial-author {
      font-weight: 600;
      color: var(--dark-slate);
      font-size: 14px;
      margin-bottom: 4px;
    }

    .testimonial-role {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* FAQ */
    .faq {
      background: white;
    }

    .faq-intro {
      text-align: center;
      margin-bottom: 60px;
    }

    .accordion {
      max-width: 700px;
      margin: 0 auto;
    }

    .accordion-item {
      border-bottom: 1px solid var(--border-gray);
      padding: 24px 0;
    }

    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      cursor: pointer;
      user-select: none;
      gap: 16px;
    }

    .accordion-header:hover {
      color: var(--accent-color, var(--accent-amber));
    }

    .accordion-header h4 {
      margin: 0;
      flex: 1;
      font-size: 16px;
      font-weight: 600;
    }

    .accordion-toggle {
      flex-shrink: 0;
      font-size: 20px;
      transition: var(--transition);
    }

    .accordion-item.open .accordion-toggle {
      transform: rotate(45deg);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      color: var(--text-secondary);
    }

    .accordion-item.open .accordion-content {
      max-height: 500px;
      padding-top: 16px;
    }

    /* Footer */
    footer {
      background: var(--dark-slate);
      color: var(--off-white);
      padding: 60px 0 40px;
    }

    .footer-content {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 24px;
    }

    .footer-col h4 {
      color: var(--off-white);
      margin-bottom: 16px;
    }

    .footer-col a {
      display: block;
      color: rgba(250, 250, 249, 0.7);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 12px;
      transition: var(--transition);
    }

    .footer-col a:hover {
      color: var(--off-white);
    }

    .footer-bottom {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 40px;
      max-width: 1280px;
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: rgba(250, 250, 249, 0.7);
    }

    /* RESULTS PAGE */
    .results-container {
      padding: 40px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .results-header {
      margin-bottom: 40px;
    }

    .results-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--dark-slate);
      margin-bottom: 8px;
    }

    .results-meta {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .confidence-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 32px;
    }

    .confidence-label {
      font-weight: 600;
      color: var(--dark-slate);
      font-size: 14px;
    }

    .confidence-meter {
      height: 8px;
      background: var(--light-gray);
      border-radius: 4px;
      width: 150px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: var(--success);
      border-radius: 4px;
    }

    .confidence-percent {
      font-weight: 600;
      color: var(--dark-slate);
      font-size: 14px;
      min-width: 40px;
    }

    .boq-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .boq-table thead {
      background: var(--light-gray);
      border-bottom: 1px solid var(--border-gray);
    }

    .boq-table th {
      padding: 16px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-right: 1px solid var(--border-gray);
    }

    .boq-table th:last-child {
      border-right: none;
    }

    .boq-table td {
      padding: 16px;
      border-bottom: 1px solid var(--border-gray);
      border-right: 1px solid var(--border-gray);
      font-size: 14px;
    }

    .boq-table td:last-child {
      border-right: none;
    }

    .boq-table tbody tr:hover {
      background: var(--light-gray);
    }

    .boq-trade-header {
      background: #F9FAFB;
      font-weight: 700;
      color: var(--dark-slate);
      border-bottom: 2px solid var(--border-gray);
    }

    .boq-subtotal {
      background: #F3F4F6;
      font-weight: 600;
      color: var(--dark-slate);
      border-bottom: 2px solid var(--border-gray);
    }

    .boq-grand-total {
      background: var(--accent-color, var(--accent-amber));
      color: white;
      font-weight: 700;
      font-size: 16px;
    }

    .flag-low {
      background: rgba(245, 158, 11, 0.1);
      color: #92400e;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .editable-cell {
      position: relative;
    }

    .editable-cell input {
      width: 100%;
      border: none;
      background: transparent;
      padding: 4px;
      font-size: 14px;
    }

    .editable-cell input:focus {
      outline: none;
      background: var(--light-gray);
      border-radius: 4px;
      padding: 4px;
    }

    .results-controls {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .results-disclaimer {
      background: var(--light-gray);
      border-left: 4px solid var(--warning);
      padding: 16px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* DASHBOARD */
    .dashboard-wrapper {
      display: flex;
      min-height: 100vh;
      background: var(--light-gray);
    }

    .dashboard-sidebar {
      width: 240px;
      background: white;
      border-right: 1px solid var(--border-gray);
      padding: 24px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      padding-top: 72px;
    }

    .dashboard-main {
      margin-left: 240px;
      flex: 1;
      padding: 40px 24px;
      margin-top: 72px;
    }

    .sidebar-item {
      padding: 12px 24px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);

  function ResultsPage({ onNavigate }) {
    const [items, setItems] = useState([
      { id: 1, trade: 'Groundworks', desc: 'Excavation & earthwork', qty: 250, unit: 'm³', rate: 8.50, flags: false },
      { id: 2, trade: 'Groundworks', desc: 'Concrete foundation', qty: 85, unit: 'm³', rate: 95.00, flags: false },
      { id: 3, trade: 'Brickwork', desc: 'Brickwork (stretcher)', qty: 2400, unit: 'No', rate: 0.65, flags: true },
      { id: 4, trade: 'Brickwork', desc: 'Blockwork (common)', qty: 1850, unit: 'No', rate: 0.45, flags: false },
      { id: 5, trade: 'Carpentry', desc: 'Timber joists 4x2"', qty: 450, unit: 'lin m', rate: 2.20, flags: false },
      { id: 6, trade: 'Roofing', desc: 'Clay tile roof', qty: 320, unit: 'm²', rate: 38.50, flags: true },
      { id: 7, trade: 'Plastering', desc: 'Internal plaster (float/set)', qty: 980, unit: 'm²', rate: 7.50, flags: false },
      { id: 8, trade: 'Electrical', desc: 'Cable & conduit', qty: 1200, unit: 'lin m', rate: 3.20, flags: false },
      { id: 9, trade: 'Plumbing', desc: 'Water pipes (15mm)', qty: 450, unit: 'lin m', rate: 5.50, flags: false },
      { id: 10, trade: 'Finishes', desc: 'Emulsion paint', qty: 1420, unit: 'm²', rate: 2.10, flags: false },
    ]);

    const [contingency, setContingency] = useState(10);

    const calculate = (qty, rate) => parseFloat((qty * rate).toFixed(2));

    const subtotalByTrade = (trade) => {
      return items
        .filter(i => i.trade === trade)
        .reduce((sum, i) => sum + calculate(i.qty, i.rate), 0);
    };

    const trades = ['Groundworks', 'Brickwork', 'Carpentry', 'Roofing', 'Plastering', 'Electrical', 'Plumbing', 'Finishes'];
    const subtotal = trades.reduce((sum, t) => sum + subtotalByTrade(t), 0);
    const contingencyAmount = subtotal * (contingency / 100);
    const grandTotal = subtotal + contingencyAmount;

    return (
      <div className="results-container">
        <div className="results-header">
          <div style={{ marginBottom: '24px' }}>
            <span
              style={{ fontSize: '13px', color: 'var(--accent-color, #F97316)', cursor: 'pointer', fontWeight: 600 }}
              onClick={() => onNavigate && onNavigate('dashboard')}
            >← Back to dashboard</span>
          </div>
          <h1 className="results-title">Bill of Quantities</h1>
          <div className="results-meta">
            <span><strong>Drawing:</strong> Commercial Unit - Main Floor Plan</span>
            <span><strong>Processed:</strong> June 4, 2026</span>
            <span><strong>Rates version:</strong> Q2 2026 BCIS</span>
          </div>

          <div className="confidence-bar">
            <span className="confidence-label">Overall confidence:</span>
            <div className="confidence-meter">
              <div className="confidence-fill" style={{ width: '92%' }}></div>
            </div>
            <span className="confidence-percent">92%</span>
            <span style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>— 2 items flagged for review</span>
          </div>

          <div className="results-disclaimer">
            <strong>⚠️ AI-generated draft.</strong> Professional review required before issue to client. This is a working document — edit and verify inline.
          </div>

          <div className="results-controls">
            <button className="btn btn-primary">📥 Download PDF</button>
            <button className="btn btn-secondary">📊 Download Excel</button>
            <button className="btn btn-secondary">🔗 Share with client</button>
            <button className="btn btn-ghost">ℹ️ View confidence details</button>
          </div>
        </div>

        <table className="boq-table">
          <thead>
            <tr>
              <th>Description</th>
              <th>Quantity</th>
              <th>Unit</th>
              <th>Unit Rate</th>
              <th>Line Total</th>
            </tr>
          </thead>
          <tbody>
            {trades.map((trade) => (
              <React.Fragment key={trade}>
                <tr className="boq-trade-header">
                  <td colSpan="5">{trade}</td>
                </tr>
                {items
                  .filter(i => i.trade === trade)
                  .map((item) => (
                    <tr key={item.id}>
                      <td>
                        {item.desc}
                        {item.flags && <div className="flag-low" style={{ marginTop: '6px' }}>⚠️ Verify</div>}
                      </td>
                      <td>
                        <div className="editable-cell">
                          <input type="number" defaultValue={item.qty} />
                        </div>
                      </td>
                      <td>{item.unit}</td>
                      <td>£{item.rate.toFixed(2)}</td>
                      <td style={{ fontWeight: 600 }}>£{calculate(item.qty, item.rate).toLocaleString()}</td>
                    </tr>
                  ))}
                <tr className="boq-subtotal">
                  <td colSpan="4" style={{ textAlign: 'right' }}>Subtotal — {trade}</td>
                  <td>£{subtotalByTrade(trade).toLocaleString('en-GB', { minimumFractionDigits: 2 })}</td>
                </tr>
              </React.Fragment>
            ))}

            <tr className="boq-subtotal">
              <td colSpan="4" style={{ textAlign: 'right' }}>Subtotal (works)</td>
              <td>£{subtotal.toLocaleString('en-GB', { minimumFractionDigits: 2 })}</td>
            </tr>

            <tr>
              <td colSpan="3">
                <label>Contingency / Allowance</label>
              </td>
              <td>
                <div className="editable-cell">
                  <input
                    type="number"
                    value={contingency}
                    onChange={(e) => setContingency(parseFloat(e.target.value))}
                    style={{ width: '60px' }}
                  />
                </div>
                %
              </td>
              <td style={{ fontWeight: 600 }}>£{contingencyAmount.toLocaleString('en-GB', { minimumFractionDigits: 2 })}</td>
            </tr>

            <tr className="boq-grand-total">
              <td colSpan="4" style={{ textAlign: 'right' }}>Grand Total</td>
              <td>£{grandTotal.toLocaleString('en-GB', { minimumFractionDigits: 2 })}</td>
            </tr>
          </tbody>
        </table>

        <p style={{ marginTop: '40px', color: 'var(--text-secondary)', fontSize: '13px' }}>
          All figures are AI-estimated based on current UK material and labour rates. Rates subject to market variation and supplier pricing. Professional QS review recommended before tender.
        </p>
      </div>
    );
  }

  function UploadPage({ onNavigate }) {
    const [isProcessing, setIsProcessing] = useState(false);
    const [uploadedFile, setUploadedFile] = useState(null);

    const handleDrop = (e) => {
      e.preventDefault();
      setUploadedFile('Commercial Unit - Main Floor Plan.pdf');
      setIsProcessing(true);
      setTimeout(() => {
        setIsProcessing(false);
        setTimeout(() => onNavigate('results'), 800);
      }, 2500);
    };

    const handleDragOver = (e) => {
      e.preventDefault();
    };

    return (
      <div className="upload-container">
        <div style={{ textAlign: 'center', marginBottom: '40px' }}>
          <h2>Upload a drawing</h2>
          <p>PDF, single or multi-page. Raster or vector.</p>
        </div>

        <div
          className="upload-zone"
          onDrop={handleDrop}
          onDragOver={handleDragOver}
          onClick={() => document.querySelector('input[type="file"]').click()}
        >
          <div className="upload-icon">📄</div>
          <h3>Drop your drawing here</h3>
          <p>or click to select a file</p>
          <p style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>PDF up to 50 MB</p>
          <input
            type="file"
            accept=".pdf"
            style={{ display: 'none' }}
            onChange={(e) => {
              if (e.target.files[0]) {
                setUploadedFile(e.target.files[0].name);
                setIsProcessing(true);
                setTimeout(() => {
                  setIsProcessing(false);
                  setTimeout(() => onNavigate('results'), 800);
                }, 2500);
              }
            }}
          />
        </div>

        {uploadedFile && (
          <div className="processing-indicator">
            <p style={{ marginBottom: '16px', color: 'var(--text-secondary)' }}>
              <strong>{uploadedFile}</strong>
            </p>
            {isProcessing ? (
              <>
                <p style={{ margin: '8px 0', fontSize: '14px' }}>Processing... ⚙️</p>
                <div className="progress-bar">
                  <div className="progress-fill"></div>
                </div>
              </>
            ) : (
              <p style={{ color: 'var(--success)', fontSize: '14px' }}>✓ Ready! Redirecting...</p>
            )}
          </div>
        )}
      </div>
    );
  }

                <button className="btn btn-primary">Save branding</button>
              </div>
            </>
          )}

          {activeTab === 'rates' && (
            <>
              <h2 style={{ marginBottom: '32px' }}>Rate overrides</h2>
              <div className="settings-section">
                <h3>Regional settings</h3>
                <p style={{ fontSize: '14px', marginBottom: '24px' }}>Base rates follow BCIS Q2 2026. Override individual trades below. Leave blank to use BCIS defaults.</p>
                <div className="settings-grid">
                  <div className="settings-field"><label>Region</label>
                    <select><option>North West England</option><option>London</option><option>South East</option><option>Yorkshire</option><option>Midlands</option><option>Scotland</option><option>Wales</option></select>
                  </div>
                  <div className="settings-field"><label>Regional uplift (%)</label><input type="number" defaultValue="0" /></div>
                </div>
              </div>
              <div className="settings-section">
                <h3>Trade overrides (£/unit)</h3>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '14px' }}>
                  <thead>
                    <tr style={{ background: 'var(--light-gray)', borderBottom: '1px solid var(--border-gray)' }}>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Trade</th>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>BCIS Default</th>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Your override</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[['Brickwork (stretcher)', '£0.65/No'], ['Blockwork (common)', '£0.45/No'], ['Clay tile roofing', '£38.50/m²'], ['Internal plaster', '£7.50/m²'], ['Emulsion paint', '£2.10/m²']].map(([trade, bcis], i) => (
                      <tr key={i} style={{ borderBottom: '1px solid var(--border-gray)' }}>
                        <td style={{ padding: '12px 16px' }}>{trade}</td>
                        <td style={{ padding: '12px 16px', color: 'var(--text-secondary)' }}>{bcis}</td>
                        <td style={{ padding: '12px 16px' }}><input type="text" placeholder="e.g. 0.70" style={{ width: '120px', padding: '8px', border: '1px solid var(--border-gray)', borderRadius: '4px', fontSize: '13px' }} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div style={{ marginTop: '24px' }}><button className="btn btn-primary">Save rate overrides</button></div>
              </div>
            </>
          )}

          {activeTab === 'billing' && (
            <>
              <h2 style={{ marginBottom: '32px' }}>Billing</h2>
              <div className="settings-section">
                <h3>Current plan</h3>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px', background: 'var(--light-gray)', borderRadius: '8px', marginBottom: '24px' }}>
                  <div>
                    <p style={{ fontWeight: 700, color: 'var(--dark-slate)', fontSize: '18px', margin: 0 }}>Pro — £39/month</p>
                    <p style={{ fontSize: '13px', margin: '4px 0 0', color: 'var(--text-secondary)' }}>Renews July 4, 2026</p>
                  </div>
                  <button className="btn btn-secondary">Change plan</button>
                </div>
              </div>
              <div className="settings-section">
                <h3>Payment method</h3>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px', border: '1px solid var(--border-gray)', borderRadius: '6px', marginBottom: '16px' }}>
                  <span style={{ fontSize: '14px' }}>Visa ending 4242 · Exp 12/28</span>
                  <button className="btn btn-ghost" style={{ fontSize: '13px' }}>Replace</button>
                </div>
                <button className="btn btn-secondary">Add payment method</button>
              </div>
              <div className="settings-section">
                <h3>Invoices</h3>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '14px' }}>
                  <thead>
                    <tr style={{ background: 'var(--light-gray)', borderBottom: '1px solid var(--border-gray)' }}>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Date</th>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Amount</th>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 600 }}>Status</th>
                      <th style={{ padding: '12px 16px' }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {[['Jun 4, 2026', '£39.00'], ['May 4, 2026', '£39.00'], ['Apr 4, 2026', '£39.00']].map(([date, amount], i) => (
                      <tr key={i} style={{ borderBottom: '1px solid var(--border-gray)' }}>
                        <td style={{ padding: '12px 16px' }}>{date}</td>
                        <td style={{ padding: '12px 16px' }}>{amount}</td>
                        <td style={{ padding: '12px 16px' }}><span style={{ color: 'var(--success)', fontWeight: 600 }}>Paid</span></td>
                        <td style={{ padding: '12px 16px' }}><button className="btn btn-ghost" style={{ fontSize: '13px', padding: '4px 8px' }}>Download</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>
          )}

        </div>
      </div>
    );
  }

  // ========== MAIN APP ==========
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "amber",
    "heroHeadline": "Price any job in 2 minutes, not 8 hours.",
    "ctaLabel": "Start free — no card required"
  }/*EDITMODE-END*/;

  function App() {
    const [currentPage, setCurrentPage] = useState('landing');
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    useEffect(() => {
      const color = t.accent === 'amber' ? '#F97316' : '#2563EB';
      document.documentElement.style.setProperty('--accent-color', color);
    }, [t.accent]);

    const pages = {
      landing:   <LandingPage  onNavigate={setCurrentPage} tweaks={t} />,
      results:   <ResultsPage  onNavigate={setCurrentPage} />,
      dashboard: <DashboardPage onNavigate={setCurrentPage} />,
      upload:    <UploadPage   onNavigate={setCurrentPage} />,
      signin:    <SignInPage   onNavigate={setCurrentPage} />,
      pricing:   <PricingPage  onNavigate={setCurrentPage} />,
      settings:  <SettingsPage onNavigate={setCurrentPage} />,
    };

    const showChrome = !['signin','dashboard','results','settings'].includes(currentPage);

    return (
      <>
        {showChrome && <Header currentPage={currentPage} onNavigate={setCurrentPage} />}
        <main style={{ minHeight: '100vh' }}>
          {pages[currentPage] || pages.landing}
        </main>
        {showChrome && <Footer onNavigate={setCurrentPage} />}

        <TweaksPanel>
          <TweakSection label="Brand" />
          <TweakRadio label="Accent colour" value={t.accent}
            options={['amber','blue']} onChange={(v) => setTweak('accent', v)} />
          <TweakSection label="Copy" />
          <TweakText label="Hero headline" value={t.heroHeadline}
            onChange={(v) => setTweak('heroHeadline', v)} />
          <TweakText label="CTA label" value={t.ctaLabel}
            onChange={(v) => setTweak('ctaLabel', v)} />
          <TweakSection label="Navigate" />
          <TweakSelect label="Jump to page" value={currentPage}
            options={['landing','upload','results','dashboard','settings','pricing','signin']}
            onChange={(v) => setCurrentPage(v)} />
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
